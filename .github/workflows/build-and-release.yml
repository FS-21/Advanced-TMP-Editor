name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run build script
      run: python build.py

    - name: Determine Version Name
      id: vars
      run: |
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          echo "version=PR-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
        else
          echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        fi

    - name: Prepare Standalone Asset
      run: |
        cd Build
        zip "../Advanced-TMP-Editor-${{ steps.vars.outputs.version }}.zip" advanced_tmp_editor.html
        cd ..

    - name: Prepare PWA Asset
      run: |
        cd Build/PWA
        zip -r "../../Advanced-TMP-Editor-PWA-${{ steps.vars.outputs.version }}.zip" .
        cd ../..

    - name: Prepare Source Code Asset
      run: |
        git archive -o "Advanced-TMP-Editor-${{ steps.vars.outputs.version }}-src.zip" HEAD

    - name: Upload Artifacts (Push/PR)
      uses: actions/upload-artifact@v4
      with:
        name: distribution-files
        path: |
          Advanced-TMP-Editor-*.zip

    - name: Create Release and Upload Assets
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          Advanced-TMP-Editor-*.zip
        generate_release_notes: true
        draft: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
